<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Projects — Sri Vishnu Safety Nets</title>
<meta name="description" content="See our portfolio of completed safety net installation projects across residential and commercial buildings." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  .page-hero{background:linear-gradient(135deg,#141414,rgba(255,122,24,.7));color:#fff;padding:80px 0 60px;text-align:center}
  .page-hero h1{font-size:clamp(36px,5vw,56px);margin-bottom:14px}
  .page-hero p{font-size:18px;opacity:.9}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin:60px 0 80px}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .proj{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.1)}
  .proj img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
  .proj:hover img{transform:scale(1.08)}
  .proj .cap{position:absolute;left:0;right:0;bottom:0;padding:20px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);color:#fff}
  .proj .cap h3{font-size:18px;margin-bottom:4px}
  .proj .cap p{opacity:.85;font-size:13px}
</style>
</head>
<body>
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <h1>Our Projects</h1>
    <p>Quality installations delivered across homes, apartments and commercial buildings.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="grid" id="projGrid"></div>
  </div>
</section>

<div id="site-footer"></div>
<div id="site-floating"></div>
<script src="site.js"></script>
<script>
  const PROJECTS = [
    { img: "images/balcony-net.jpg", t: "Balcony Net — Apartment Complex", s: "Residential" },
    { img: "images/building-net.jpg", t: "Building Coverage Net", s: "Commercial" },
    { img: "images/pigeon-net.jpg", t: "Pigeon Net — Office Block", s: "Commercial" },
    { img: "images/kids-net.jpg", t: "Kids Safety Installation", s: "Residential" },
    { img: "images/pool-net.jpg", t: "Swimming Pool Safety Net", s: "Resort" },
    { img: "images/staircase-net.jpg", t: "Staircase Net — Duplex Home", s: "Residential" },
    { img: "images/terrace-net.jpg", t: "Terrace Bird Net", s: "Residential" },
    { img: "images/sports-net.jpg", t: "Cricket Practice Net", s: "Sports Club" },
    { img: "images/invisible-grill.jpg", t: "Invisible Grill — Highrise", s: "Residential" },
  ];
  document.getElementById("projGrid").innerHTML = PROJECTS.map(p => `
    <div class="proj">
      <img src="${p.img}" alt="${p.t}" loading="lazy" />
      <div class="cap"><h3>${p.t}</h3><p>${p.s}</p></div>
    </div>
  `).join("");

  SVSN.renderHeader("Projects");
  SVSN.renderFooter();
  SVSN.renderFloating();
</script>
</body>
</html>
